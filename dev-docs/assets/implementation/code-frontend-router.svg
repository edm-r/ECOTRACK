  <text x="56" y="68" fill="#E2E8F0" font-family="Menlo, Monaco, monospace" font-size="26" font-weight="700">frontend/src/router/index.tsx - routage role-based</text>
  <text x="56" y="104" fill="#94A3B8" font-family="Menlo, Monaco, monospace" font-size="18">Extrait du routeur principal : redirection par role et protection des pages</text>
  <g font-family="Menlo, Monaco, monospace" font-size="17.5">
    <text x="60" y="154" fill="#64748B">27</text><text x="110" y="154" fill="#E5E7EB">const </text><text x="162" y="154" fill="#93C5FD">ROLE_REDIRECT</text><text x="314" y="154" fill="#E5E7EB"> = {</text>
    <text x="60" y="186" fill="#64748B">28</text><text x="110" y="186" fill="#A7F3D0">  CITIZEN</text><text x="212" y="186" fill="#E5E7EB">: </text><text x="236" y="186" fill="#FCA5A5">'/map'</text><text x="308" y="186" fill="#E5E7EB">,</text>
    <text x="60" y="218" fill="#64748B">29</text><text x="110" y="218" fill="#A7F3D0">  AGENT</text><text x="188" y="218" fill="#E5E7EB">: </text><text x="212" y="218" fill="#FCA5A5">'/my-tours'</text><text x="340" y="218" fill="#E5E7EB">,</text>
    <text x="60" y="250" fill="#64748B">30</text><text x="110" y="250" fill="#A7F3D0">  MANAGER</text><text x="224" y="250" fill="#E5E7EB">: </text><text x="248" y="250" fill="#FCA5A5">'/dashboard'</text><text x="376" y="250" fill="#E5E7EB">,</text>
    <text x="60" y="282" fill="#64748B">31</text><text x="110" y="282" fill="#A7F3D0">  ADMIN</text><text x="200" y="282" fill="#E5E7EB">: </text><text x="224" y="282" fill="#FCA5A5">'/dashboard'</text><text x="352" y="282" fill="#E5E7EB">,</text>
    <text x="60" y="314" fill="#64748B">34</text><text x="110" y="314" fill="#E5E7EB">function </text><text x="214" y="314" fill="#93C5FD">RootRedirect</text><text x="340" y="314" fill="#E5E7EB">() {</text>
    <text x="60" y="346" fill="#64748B">36</text><text x="110" y="346" fill="#E5E7EB">  if (!token || !user) return </text><text x="382" y="346" fill="#FDE68A">&lt;Navigate to="/login" replace /&gt;</text>
