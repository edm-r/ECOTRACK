    <text x="60" y="442" fill="#64748B">81</text><text x="110" y="442" fill="#64748B">{/* MANAGER + ADMIN */}</text>
    <text x="60" y="474" fill="#64748B">82</text><text x="110" y="474" fill="#E5E7EB">&lt;Route path=</text><text x="242" y="474" fill="#FCA5A5">"/dashboard"</text><text x="362" y="474" fill="#E5E7EB"> element={</text>
    <text x="60" y="506" fill="#64748B">85</text><text x="110" y="506" fill="#FDE68A">  &lt;ProtectedRoute allow={['MANAGER', 'ADMIN']}&gt;</text>
    <text x="60" y="538" fill="#64748B">86</text><text x="110" y="538" fill="#FDE68A">    &lt;AppShell&gt;&lt;DashboardPage /&gt;&lt;/AppShell&gt;</text>
    <text x="60" y="570" fill="#64748B">89</text><text x="110" y="570" fill="#E5E7EB">}/&gt;</text>
    <text x="60" y="618" fill="#64748B">157</text><text x="110" y="618" fill="#64748B">{/* AGENT */}</text>
