<svg width="1480" height="860" viewBox="0 0 1480 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1480" height="860" rx="24" fill="#0F172A"/>
  <rect x="24" y="24" width="1432" height="812" rx="18" fill="#111827" stroke="#334155"/>
  <text x="56" y="68" fill="#E2E8F0" font-family="Menlo, Monaco, monospace" font-size="26" font-weight="700">backend/app/api/v1/auth.py - endpoints d'authentification</text>
  <text x="56" y="104" fill="#94A3B8" font-family="Menlo, Monaco, monospace" font-size="18">Extrait du code backend : inscription, login limite et refresh token</text>
  <g font-family="Menlo, Monaco, monospace" font-size="17.5">
    <text x="60" y="154" fill="#64748B">34</text><text x="110" y="154" fill="#C4B5FD">@router.post(</text><text x="260" y="154" fill="#FCA5A5">"/register"</text><text x="374" y="154" fill="#C4B5FD">)</text>
    <text x="60" y="186" fill="#64748B">39</text><text x="110" y="186" fill="#E5E7EB">async def </text><text x="210" y="186" fill="#93C5FD">register</text><text x="298" y="186" fill="#E5E7EB">(payload, request, db):</text>
    <text x="60" y="218" fill="#64748B">44</text><text x="110" y="218" fill="#E5E7EB">  existing = await get_user_by_email(payload.email, db)</text>
    <text x="60" y="250" fill="#64748B">46</text><text x="110" y="250" fill="#E5E7EB">  raise HTTPException(status_code=</text><text x="428" y="250" fill="#FDE68A">409</text><text x="460" y="250" fill="#E5E7EB">, detail=</text><text x="596" y="250" fill="#FCA5A5">"Email deja utilise"</text><text x="794" y="250" fill="#E5E7EB">)</text>
    <text x="60" y="282" fill="#64748B">51</text><text x="110" y="282" fill="#E5E7EB">  user = await create_user(payload, db, role=</text><text x="558" y="282" fill="#A7F3D0">UserRole.CITIZEN</text><text x="726" y="282" fill="#E5E7EB">)</text>
    <text x="60" y="314" fill="#64748B">53</text><text x="110" y="314" fill="#E5E7EB">  await log_event(action=</text><text x="336" y="314" fill="#FCA5A5">"USER_REGISTER"</text><text x="486" y="314" fill="#E5E7EB">, actor_id=user.id)</text>
    <text x="60" y="346" fill="#64748B">62</text><text x="110" y="346" fill="#E5E7EB">  return </text><text x="192" y="346" fill="#93C5FD">build_token_response</text><text x="366" y="346" fill="#E5E7EB">(user)</text>
    <text x="60" y="410" fill="#64748B">65</text><text x="110" y="410" fill="#C4B5FD">@router.post(</text><text x="260" y="410" fill="#FCA5A5">"/login"</text><text x="350" y="410" fill="#C4B5FD">, response_model=TokenResponse)</text>
    <text x="60" y="442" fill="#64748B">66</text><text x="110" y="442" fill="#C4B5FD">@limiter.limit(</text><text x="272" y="442" fill="#FCA5A5">"5/5minute"</text><text x="392" y="442" fill="#C4B5FD">)</text>
    <text x="60" y="474" fill="#64748B">72</text><text x="110" y="474" fill="#E5E7EB">  user = await authenticate(payload.email, payload.password, db)</text>
    <text x="60" y="506" fill="#64748B">74</text><text x="110" y="506" fill="#E5E7EB">  await log_event(action=</text><text x="336" y="506" fill="#FCA5A5">"LOGIN_FAILED"</text><text x="478" y="506" fill="#E5E7EB">, details={"email": payload.email})</text>
    <text x="60" y="538" fill="#64748B">80</text><text x="110" y="538" fill="#E5E7EB">  raise HTTPException(status_code=</text><text x="428" y="538" fill="#FDE68A">401</text><text x="460" y="538" fill="#E5E7EB">, detail=</text><text x="596" y="538" fill="#FCA5A5">"Email ou mot de passe incorrect"</text><text x="936" y="538" fill="#E5E7EB">)</text>
    <text x="60" y="570" fill="#64748B">86</text><text x="110" y="570" fill="#E5E7EB">  await log_event(action=</text><text x="336" y="570" fill="#FCA5A5">"LOGIN_SUCCESS"</text><text x="494" y="570" fill="#E5E7EB">, actor_id=user.id)</text>
    <text x="60" y="602" fill="#64748B">95</text><text x="110" y="602" fill="#E5E7EB">  return </text><text x="192" y="602" fill="#93C5FD">build_token_response</text><text x="366" y="602" fill="#E5E7EB">(user)</text>
    <text x="60" y="666" fill="#64748B">98</text><text x="110" y="666" fill="#C4B5FD">@router.post(</text><text x="260" y="666" fill="#FCA5A5">"/refresh"</text><text x="382" y="666" fill="#C4B5FD">, response_model=TokenResponse)</text>
    <text x="60" y="698" fill="#64748B">103</text><text x="110" y="698" fill="#E5E7EB">  try:</text>
    <text x="60" y="730" fill="#64748B">104</text><text x="110" y="730" fill="#E5E7EB">    user_id_str = </text><text x="286" y="730" fill="#93C5FD">decode_refresh_token</text><text x="486" y="730" fill="#E5E7EB">(payload.refresh_token)</text>
    <text x="60" y="762" fill="#64748B">106</text><text x="110" y="762" fill="#E5E7EB">    raise HTTPException(status_code=</text><text x="428" y="762" fill="#FDE68A">401</text><text x="460" y="762" fill="#E5E7EB">, detail=</text><text x="596" y="762" fill="#FCA5A5">"Refresh token invalide ou expire"</text><text x="936" y="762" fill="#E5E7EB">)</text>
    <text x="60" y="794" fill="#64748B">119</text><text x="110" y="794" fill="#E5E7EB">  return </text><text x="192" y="794" fill="#93C5FD">build_token_response</text><text x="366" y="794" fill="#E5E7EB">(user)</text>
  </g>
</svg>
