[pytest]
asyncio_mode = auto
testpaths = tests
# TECH-18: under asyncio_mode=auto, pytest-asyncio auto-applies the asyncio
# mark to EVERY collected test, then warns for the pure-sync unit tests
# (status_engine / optimizer / prediction) that are plain `def`. Those tests
# are correctly sync and must stay sync, so we silence that specific
# PytestWarning rather than marking real coroutines or changing the mode.
filterwarnings =
    ignore:.*is marked with '@pytest.mark.asyncio' but it is not an async function.*:pytest.PytestWarning
